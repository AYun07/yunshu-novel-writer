<!DOCTYPE html>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ============================================ -->
    <!-- PWA Manifest -->

    <link rel="manifest" href="/manifest.json" />
    
    <!-- ============================================ -->

    <!-- ============================================ -->
    <!-- 如果有 API 服务器，请添加预连接 -->
    <!-- <link rel="preconnect" href="https://api.yunshu.app" /> -->
    <!-- <link rel="dns-prefetch" href="https://api.yunshu.app" /> -->
    
    <!-- CDN 预连接（如果使用 CDN） -->
    <!-- <link rel="preconnect" href="https://cdn.yunshu.app" crossorigin /> -->
    
    <!-- ============================================ -->
    <!-- 预加载关键资源 -->
    <!-- ============================================ -->
    <!-- 预加载关键 CSS（如果有关键 CSS） -->
    <!-- <link rel="preload" as="style" href="/assets/critical.css" /> -->
    
    <!-- 预加载关键字体 -->
    <!-- <link rel="preload" as="font" href="/fonts/inter-var.woff2" type="font/woff2" crossorigin /> -->
    
    <!-- ============================================ -->
    <!-- 性能优化 -->
    <!-- ============================================ -->

    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    
    <!-- ============================================ -->
    <!-- 安全相关 -->
    <!-- ============================================ -->
    <!-- 内容安全策略（根据需要调整） -->
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.yunshu.app;" /> -->
    
    <!-- ============================================ -->
    <!-- 其他优化 -->
    <!-- ============================================ -->
    <!-- 禁止自动识别电话号码 -->
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    
    <!-- iOS 添加到主屏幕后的启动画面 -->
    <meta name="apple-touch-startup-image" href="/icons/splash.png" />
    
    <!-- ============================================ -->
    <!-- 结构化数据（JSON-LD） -->
    <!-- ============================================ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "云书",
      "description": "AI智能小说创作平台 - 专业的AI小说创作工具",
      "url": "https://yunshu.app",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "CNY"
      },
      "author": {
        "@type": "Organization",
        "name": "云书团队"
      }
    }
    </script>
    
    <!-- ============================================ -->
    <!-- 内联关键 CSS（防止白屏闪烁） -->
    <!-- ============================================ -->
    <style>
      /* 基础重置 */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      /* 防止白屏闪烁 */
      html, body {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f5f7fa;
      }
      
      /* 应用容器 */
      #app {
        width: 100%;
        height: 100%;
      }
      
      /* 加载动画 */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      
      .app-loading-logo {
        font-size: 48px;
        margin-bottom: 20px;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .app-loading-text {
        color: white;
        font-size: 24px;
        font-weight: 500;
        margin-bottom: 30px;
      }
      
      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      
      /* 暗色模式适配 */
      @media (prefers-color-scheme: dark) {
        html, body {
          background-color: #1a1a2e;
        }
      }
    </style>
  </head>
  <body>
    <!-- 应用根容器 -->
    <div id="app">
      <!-- 初始加载动画（在 Vue 应用加载前显示） -->
      <div class="app-loading">
        <div class="app-loading-logo">📚</div>
        <div class="app-loading-text">云书</div>
        <div class="app-loading-spinner"></div>
      </div>
    </div>
    
    <!-- ============================================ -->
    <!-- 主应用脚本 -->
    <!-- ============================================ -->
    <script type="module" src="/src/main.js"></script>
    
    <!-- ============================================ -->
    <!-- Service Worker 注册（仅 Web 环境，Capacitor 原生环境跳过） -->
    <!-- ============================================ -->
    <script>
      // 仅在 Web 环境且非 Capacitor 原生应用时注册 Service Worker
      if ('serviceWorker' in navigator && !(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/'
            });
            console.log('[PWA] Service Worker 注册成功:', registration.scope);
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[PWA] 新版本可用，请刷新页面');
                }
              });
            });
          } catch (error) {
            console.error('[PWA] Service Worker 注册失败:', error);
          }
        });
      }
    </script>
    
    <!-- ============================================ -->
    <!-- 性能监控初始化 -->
    <!-- ============================================ -->
    <script>
      // 记录页面加载开始时间
      window.__PAGE_START_TIME__ = Date.now();
      
      // 页面可见性变化监控
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          console.log('[性能] 页面变为可见');
        }
      });
    </script>
  </body>
</html>
