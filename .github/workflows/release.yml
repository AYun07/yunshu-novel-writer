name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.5.0)'
        required: true
        default: '2.5.0'

jobs:
  # Web 构建
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # Electron - Windows
  build-windows:
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: pnpm electron:build:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: release/*-portable.exe

  # Electron - macOS
  build-macos:
    runs-on: macos-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: pnpm electron:build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: release/*.zip

  # Electron - Linux
  build-linux:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: pnpm electron:build:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb

  # Android APK
  build-android:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: pnpm cap:android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk

  # 创建 GitHub Release
  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux, build-android]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Display structure of downloaded files
        run: ls -R artifacts/
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-installer/*
            artifacts/windows-portable/*
            artifacts/macos-dmg/*
            artifacts/macos-zip/*
            artifacts/linux-appimage/*
            artifacts/linux-deb/*
            artifacts/android-apk/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
