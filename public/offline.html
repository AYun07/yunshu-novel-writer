<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云书 - 离线</title>
  <style>
    /* 基础重置 */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .container {
      text-align: center;
      padding: 40px;
      max-width: 400px;
    }

    .icon {
      font-size: 80px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 500;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .btn:active {
      transform: translateY(0);
    }

    .tips {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      text-align: left;
    }

    .tips h3 {
      font-size: 14px;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .tips ul {
      list-style: none;
      font-size: 14px;
      opacity: 0.8;
    }

    .tips li {
      margin-bottom: 8px;
      padding-left: 20px;
      position: relative;
    }

    .tips li::before {
      content: '•';
      position: absolute;
      left: 0;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    /* 暗色模式 */
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      }

      .btn {
        background: #409eff;
        color: white;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📚</div>
    <h1>暂无网络连接</h1>
    <p>您当前处于离线状态，无法访问云书。请检查您的网络设置后重试。</p>
    <button class="btn" onclick="location.reload()">重新加载</button>

    <div class="tips">
      <h3>离线提示</h3>
      <ul>
        <li>检查您的网络连接是否正常</li>
        <li>尝试切换到其他网络</li>
        <li>部分已缓存的功能仍可使用</li>
        <li>网络恢复后将自动同步数据</li>
      </ul>
    </div>
  </div>

  <script>
    // 监听网络状态变化
    window.addEventListener('online', () => {
      console.log('[离线页面] 网络已恢复');
      // 自动刷新页面
      location.reload();
    });

    window.addEventListener('offline', () => {
      console.log('[离线页面] 网络已断开');
    });

    // 检查当前网络状态
    if (navigator.onLine) {
      // 如果有网络，尝试返回首页
      location.href = '/';
    }
  </script>
</body>
</html>
